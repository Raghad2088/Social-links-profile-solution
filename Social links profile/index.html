<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social links profile solution</title>
    <!-- style CSS File -->
    <link rel="stylesheet" href="style.css" />
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <article class="social-card">
        <header class="profile-header">
          <img src="avatar-jessica.jpeg" alt="Jessica Randall" class= "avatar" />

          <h1 class="name">Jessica Randall</h1>
          <p class="location">London, United Kingdom</p>
        </header>
        <p class="bio">"Front-end developer and avid reader"</p>
        <ul class="links-list">
  <li><a href="#" aria-label="GitHub profile">GitHub</a></li>
  <li><a href="#" aria-label="Frontend Mentor profile">Frontend Mentor</a></li>
  <li><a href="#" aria-label="LinkedIn profile">LinkedIn</a></li>
  <li><a href="#" aria-label="Twitter profile">Twitter</a></li>
  <li><a href="#" aria-label="Instagram profile">Instagram</a></li>
</ul>
      </article>
    </main>
  </body>
</html>
